# 站点配置 —— 单一注册表（Single Source of Truth）
# 修改分类只需在此文件增删条目，构建脚本会自动为每个分类生成目录页（含空分类）。

site:
  # 默认语言：决定未指定语言时的回退语言，以及 "/" 根路径跳转目标
  default_lang: zh
  title:
    zh: 余玉桂战略研究室
    en: Yu Yugui Strategy Lab
  description:
    zh: 跨学科战略研究笔记 —— 天文、地理、政治、哲学、经济、国际、国家、公司、个人、技术与杂谈。
    en: Cross-disciplinary strategy notes — astronomy, geography, politics, philosophy, economy, international affairs, nations, companies, individuals, technology, and miscellany.
  author: 余玉桂 · Yu Yugui
  # GitHub 仓库，用于生成文章源码链接与编辑链接
  repo: yuyuguilab/yuyuguilab.github.io

# 分类目录 —— order 决定展示顺序
# 文章放在 content/<slug>/ 目录下，slug 必须与本处 key 一致
categories:
  - slug: company
    name: { zh: 公司, en: Companies }
  - slug: economy
    name: { zh: 经济, en: Economy }
  - slug: politics
    name: { zh: 政治, en: Politics }
  - slug: international
    name: { zh: 国际, en: International }
  - slug: nation
    name: { zh: 国家, en: Nations }
  - slug: philosophy
    name: { zh: 哲学, en: Philosophy }
  - slug: astronomy
    name: { zh: 天文, en: Astronomy }
  - slug: geography
    name: { zh: 地理, en: Geography }
  - slug: technology
    name: { zh: 技术, en: Technology }
  - slug: personal
    name: { zh: 个人, en: Personal }
  - slug: misc
    name: { zh: 杂谈, en: Miscellany }
