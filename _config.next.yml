# NexT 主题配置 —— 同时应用于中英文站（主题级覆盖）

# --------------------------------------------------------------- Scheme
scheme: Gemini

# 深色模式：跟随系统
darkmode: true
auto2awd: true

# --------------------------------------------------------------- Navigation
menu:
  home: / || fa fa-home
  categories: /categories/ || fa fa-th
  archives: /archives/ || fa fa-archive
  tags: /tags/ || fa fa-tags
  # 关于页待添加 source 后启用
  # about: /about/ || fa fa-user

# --------------------------------------------------------------- Sidebar
sidebar:
  position: left
  display: post

# 头像 / 站点信息
avatar:
  url: /images/avatar.png
  rounded: true
  opacity: 1
  microavatar: ""

# 站点子标题（覆盖主题默认）
# NexT 用 site.subtitle 显示在 logo 下

# 侧栏社交链接
social:
  GitHub: https://github.com/yuyuguilab || fa fa-github
  E-Mail: mailto:yuyuguilab@users.noreply.github.com || fa fa-envelope

# 侧栏组件
sidebar_component:
  posts: true
  categories: true
  tags: true

# --------------------------------------------------------------- Posts
post_body:
  highlight:
    enable: true
    line_number: true

# 目录
toc:
  enable: true
  number: true
  wrap: false
  expand_all: false
  max_depth: 4

# 文章元信息
post_meta:
  item_text: true
  created_at: true
  updated_at:
    enable: true
    another_day: true
  categories: true

# 字数统计 / 阅读时长（无需插件，NexT 内置）
symbols_count_time:
  separated_meta: true
  item_text_total: true
  awl: 2
  wpm: 300

# 标签图标
tag_icon: true

# 文章版权
post_copyright:
  enable: true
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏（暂关）
reward:
  enable: false

# --------------------------------------------------------------- Misc UI
# 代码块复制按钮
codeblock:
  style:
    button:
      enable: true
      mac_style: true

# 回到顶部
back2top:
  enable: true
  sidebar: false
  scrollpercent: true

# 阅读进度条
reading_progress:
  enable: true
  position: top
  color: "#37c6c0"
  height: 3px

# 书签
bookmark:
  enable: false

# 本地搜索
local_search:
  enable: true
  trigger: auto
  top_n_per_article: 1
  unescape: false
  preload: false

# Fancybox 图片放大
fancybox: true

# 中英文字体优化
font:
  enable: false

# --------------------------------------------------------------- Footer
footer:
  since: 2026
  icon:
    name: fa fa-anchor
    color: "#37c6c0"
  powered: true
  theme:
    enable: true
    version: true
  beian:
    enable: false

# --------------------------------------------------------------- Misc
# 阻止 Google，本地搜索已够用
google_analytics:
  tracking_id: ""

# PWA / Analytics 暂不启用
pjax: false
motion:
  enable: true
  async: true
  transition:
    post_block: fadeIn
    post_header: fadeInDown
    post_body: fadeInUp
    coll_header: fadeInLeft
    sidebar: fadeInUp
